# Render Blueprint — deploy DailyGate's data + trust API publicly.
# Why: lets the Guild cloud-triggered agent read LIVE trust (not the embedded
# snapshot), gives a public demo URL, and makes "Best Use of Render" legitimate.
#
# Deploy: Render → New → Blueprint → pick this repo. Then set the two secret env
# vars in the dashboard. (Or New → Web Service and use the settings below.)
services:
  - type: web
    name: dailygate-api
    runtime: python
    rootDir: data/api
    plan: free
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT — do NOT hardcode 8001 here, and no --reload in prod.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LANGFUSE_BASE_URL
        value: https://cloud.langfuse.com
      - key: LANGFUSE_PUBLIC_KEY
        sync: false          # set in dashboard (secret)
      - key: LANGFUSE_SECRET_KEY
        sync: false          # set in dashboard (secret)
